# fultonj tmux config (Wayland Optimized)
set -g default-terminal "tmux-256color"
set -g history-limit 1000000

# Prefix Config
unbind C-b
set -g prefix C-j
bind C-j send-prefix

# Navigation & Behavior
set -g base-index 1
set -g renumber-windows on
set -g escape-time 0
set -g focus-events on # Helps with clipboard sync and vim

# --- Mouse & Clipboard Logic ---
set -g mouse on
set -g set-clipboard on

# 1. Selection: "Hold shift to highlight" still works natively,
# but this makes tmux selections also go to Wayland's clipboard.
set -s copy-command 'wl-copy'

# 2. THE FIX: Middle-click paste without Shift
# This pulls from Wayland's primary selection into a tmux buffer and pastes it.
unbind -n MouseDown2Pane
bind -n MouseDown2Pane run "wl-paste -p -n | tmux load-buffer - && tmux paste-buffer"

# 3. Standard Paste (Prefix + p)
bind p run "wl-paste -n | tmux load-buffer - && tmux paste-buffer"

# 4. VI Mode Copying (Optional but recommended)
set-window-option -g mode-keys vi
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "wl-copy; wl-copy --primary"

# --- UI & Plugins ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'catppuccin/tmux'

set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_default_text "#W"
set -g @catppuccin_window_current_text "#W"
set -g @catppuccin_window_text "#W"
set -g @catppuccin_date_time_text " %d %b %H:%M"

set -g status-position top
set -g status-right-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_session}"
set -ag status-right "#{E:@catppuccin_status_application}"
set -ag status-right "#{E:@catppuccin_status_directory}"
set -ag status-right "#{E:@catppuccin_status_date_time}"

# Environment
set -g update-environment "SWAYSOCK WAYLAND_DISPLAY DISPLAY"

run '~/.tmux/plugins/tpm/tpm'
